# Next 앱 품질 검증 (루트 단일 패키지). Vercel 빌드와 별개로 PR/푸시에서 빠르게 피드백.
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  frontend:
    name: Next.js CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=critical

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  notify:
    name: Discord notify
    needs: frontend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (script only)
        uses: actions/checkout@v4

      - name: Notify Discord
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WORKFLOW_CONCLUSION: ${{ needs.frontend.result }}
          NOTIFY_TITLE: CI
          COMMIT_MESSAGE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message }}
        run: bash scripts/github-discord-notify.sh
