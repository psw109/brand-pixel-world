# DB 마이그레이션 전용 워크플로. Next 린트·빌드는 `ci.yml`과 별도로 둔다.
# dev 브랜치 → 스테이징 Supabase(Secrets 이름은 SUPABASE_PREVIEW_* 유지) / main → Production
# Production job은 GitHub Settings → Environments → Production 에서
# Required reviewers 를 켜 두면 승인 후에만 db push 가 실행된다.
name: Supabase migrations

on:
  push:
    branches: [main, dev]
    paths:
      - "supabase/migrations/**"
      # 워크플로만 수정할 때는 db push 가 불필요하므로 paths 에 넣지 않음.
      # 워크플로 검증은 Actions → Supabase migrations → Run workflow
  workflow_dispatch:

jobs:
  # Production 환경 승인 대기 중에는 아래 deploy-production 스텝이 시작되지 않으므로,
  # 환경이 없는 이 job으로 먼저 Discord에 같은 run URL을 보내 승인 진입점을 제공한다.
  discord-production-approval-hint:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Discord — 운영 마이그레이션 승인 링크
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WORKFLOW_CONCLUSION: info
          NOTIFY_TITLE: Supabase migrations (production) — 승인 필요
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          SHOW_PRODUCTION_APPROVAL_LINK: "1"
        run: bash scripts/github-discord-notify.sh

  deploy-staging:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    concurrency:
      group: supabase-migrations-dev
      cancel-in-progress: false

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PREVIEW_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PREVIEW_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link & push (staging Supabase, dev branch)
        id: migrate
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

      - name: Notify Discord
        continue-on-error: true
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WORKFLOW_CONCLUSION: ${{ steps.migrate.outcome }}
          NOTIFY_TITLE: Supabase migrations (staging)
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: bash scripts/github-discord-notify.sh

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    concurrency:
      group: supabase-migrations-production
      cancel-in-progress: false

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link & push (Production)
        id: migrate
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

      - name: Notify Discord
        continue-on-error: true
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WORKFLOW_CONCLUSION: ${{ steps.migrate.outcome }}
          NOTIFY_TITLE: Supabase migrations (production)
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: bash scripts/github-discord-notify.sh
