# Preview 브랜치 → 스테이징 Supabase / main → Production Supabase
# Production job은 GitHub Settings → Environments → Production 에서
# Required reviewers 를 켜 두면 승인 후에만 db push 가 실행된다.
name: Supabase migrations

on:
  push:
    branches: [main, preview]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

jobs:
  deploy-preview:
    if: github.ref == 'refs/heads/preview'
    runs-on: ubuntu-latest
    concurrency:
      group: supabase-migrations-preview
      cancel-in-progress: false

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PREVIEW_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PREVIEW_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link & push (Preview / staging)
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    concurrency:
      group: supabase-migrations-production
      cancel-in-progress: false

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link & push (Production)
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push
